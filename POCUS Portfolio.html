<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>POCUS Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-theme="clinical" data-density="comfortable">
<div id="root"></div>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="case-views.jsx"></script>
<script type="text/babel" src="trainee.jsx"></script>
<script type="text/babel" src="faculty.jsx"></script>
<script type="text/babel" src="admin.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo } = React;
const { useDB } = window.POCUSPrim;
const { TraineeApp } = window.POCUSTrainee;
const { FacultyApp } = window.POCUSFaculty;
const { AdminApp }   = window.POCUSAdmin;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "clinical",
  "density": "comfortable"
}/*EDITMODE-END*/;

function App() {
  const [db, update] = useDB();
  const [tweaks, setTweaksState] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  // Apply theme + density.
  useEffect(() => {
    document.body.dataset.theme = tweaks.theme;
    document.body.dataset.density = tweaks.density;
  }, [tweaks.theme, tweaks.density]);

  // Tweaks toggle protocol.
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode')   setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    const next = typeof k === 'object' ? { ...tweaks, ...k } : { ...tweaks, [k]: v };
    setTweaksState(next);
    const edits = typeof k === 'object' ? k : { [k]: v };
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); } catch {}
  };

  // Resolve current viewer & role.
  const session = db.session || { userId: 'admin-self', role: 'admin' };
  const viewer = useMemo(() => window.POCUSData.findUser(db, session.userId) || db.admins[0], [db, session.userId]);
  const role = window.POCUSData.userRole(db, viewer?.id) || 'admin';

  const switchTo = (userId) => {
    const r = window.POCUSData.userRole(db, userId);
    update(prev => ({ ...prev, session: { userId, role: r } }));
  };

  // The persona bar lives at the top of the app — lets you switch between
  // any seeded user (the program director, every faculty, every trainee).
  // This is the demo's "log in as" affordance, replacing the magic-link login.
  return (
    <>
      <PersonaBar db={db} viewer={viewer} role={role} onSwitch={switchTo} />
      <div style={{ height: 'calc(100vh - 44px)' }}>
        {role === 'trainee' ? <TraineeApp db={db} viewer={viewer} update={update} />
         : role === 'faculty' ? <FacultyApp db={db} viewer={viewer} update={update} />
         : <AdminApp db={db} viewer={viewer} update={update} />}
      </div>
      {tweaksOpen && <TweaksFloater tweaks={tweaks} setTweak={setTweak} setOpen={setTweaksOpen} />}
    </>
  );
}

function PersonaBar({ db, viewer, role, onSwitch }) {
  const admins = db.admins || [];
  const faculty = db.faculty || [];
  const trainees = db.trainees || [];
  const totalNonAdmin = faculty.length + trainees.length;

  return (
    <div className="app-topbar">
      <div className="role-pill"><span className="dot" /> Signed in as <strong>{viewer?.name}</strong> · {role}</div>
      <span style={{ flex: 1 }} />
      <span style={{ fontSize: 'var(--fs-xs)', color: 'var(--ink-3)' }}>Switch user:</span>
      <select className="select" style={{ width: 280, height: 28 }} value={viewer?.id || ''} onChange={e => onSwitch(e.target.value)}>
        <optgroup label="Admin">
          {admins.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
        </optgroup>
        {faculty.length > 0 && (
          <optgroup label="Faculty">
            {faculty.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
          </optgroup>
        )}
        {trainees.length > 0 && (
          <optgroup label="Trainees">
            {trainees.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
          </optgroup>
        )}
      </select>
      {totalNonAdmin === 0 && <span style={{ fontSize: 'var(--fs-xs)', color: 'var(--ink-3)' }}>(invite people to add more accounts)</span>}
    </div>
  );
}

function TweaksFloater({ tweaks, setTweak, setOpen }) {
  const themes = [
    { id: 'clinical',  label: 'Clinical' },
    { id: 'editorial', label: 'Editorial' },
    { id: 'mono',      label: 'Mono' },
  ];
  return (
    <div style={{
      position: 'fixed', right: 20, bottom: 20, zIndex: 60,
      width: 280, background: 'var(--surface)', border: '1px solid var(--line-strong)',
      borderRadius: 'var(--radius-lg)', padding: 16, boxShadow: '0 20px 60px rgba(0,0,0,0.18)',
      fontFamily: 'var(--font-ui)', color: 'var(--ink)',
      display: 'flex', flexDirection: 'column', gap: 14,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 14 }}>Tweaks</div>
        <span style={{ flex: 1 }} />
        <button className="btn ghost icon sm" onClick={() => {
          setOpen(false);
          try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch {}
        }}>✕</button>
      </div>

      <div>
        <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-3)', marginBottom: 6 }}>Theme</div>
        <div className="row" style={{ gap: 4 }}>
          {themes.map(t => (
            <button key={t.id} className="chip" aria-pressed={tweaks.theme === t.id}
              style={{ flex: 1, justifyContent: 'center' }}
              onClick={() => setTweak('theme', t.id)}>{t.label}</button>
          ))}
        </div>
      </div>

      <div>
        <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-3)', marginBottom: 6 }}>Density</div>
        <div className="row" style={{ gap: 4 }}>
          {[{id:'comfortable', l:'Comfortable'}, {id:'compact', l:'Compact'}].map(t => (
            <button key={t.id} className="chip" aria-pressed={tweaks.density === t.id}
              style={{ flex: 1, justifyContent: 'center' }}
              onClick={() => setTweak('density', t.id)}>{t.l}</button>
          ))}
        </div>
      </div>

      <div>
        <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-3)', marginBottom: 6 }}>Reset</div>
        <button className="btn danger sm" style={{ width: '100%' }} onClick={() => {
          if (confirm('Reset all program data?')) { window.POCUSData.resetDB(); location.reload(); }
        }}>Reset all data</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
