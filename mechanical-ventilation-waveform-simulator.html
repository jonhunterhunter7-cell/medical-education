/**
 * Ventilator simulation engine — pure functions only.
 * No React, no DOM. Imported by the rendering component (vent-waveforms.jsx)
 * and exercised directly by the test suite (vent-engine.test.js).
 *
 * Equation of motion:  P_aw(t) = V(t)/C + Flow(t)·R + PEEP
 */
const CONSTANTS = {
  SAMPLE_DT: 0.01,             // simulation timestep (sec) — 100 Hz
  WINDOW_SEC: 6,               // visible time window in plots
  TRENDS_LEN: 30,              // breaths held in the trends sparklines
  HOLD_DURATION_SEC: 2,        // duration of inspiratory/expiratory hold
  // Trigger detection (sec)
  TRIG_PRESSURE_MIN: 0.06,
  TRIG_PRESSURE_MAX: 0.22,
  TRIG_FLOW_MIN: 0.05,
  TRIG_FLOW_MAX: 0.18,
  TRIG_AUTOTRACK_FIXED: 0.07,
  // Patient effort magnitudes
  PRESSURE_TRIG_BASE_DIP: 1.5,    // cmH2O baseline dip for pressure trigger
  PRESSURE_TRIG_DIP_PER_SENS: 0.15,
  FLOW_TRIG_PRESSURE_DIP: 0.4,    // cmH2O — small, just to show effort
  AUTOTRACK_BASE_DIP: 0.8,
  AUTOTRACK_DIP_PER_SENS: 0.05,
  // CPAP modeling
  CPAP_EFFORT_PRESSURE: 6,      // cmH2O peak inspiratory muscle effort
  CPAP_COMPENSATION_GAP: 1.5,   // imperfect blower compensation, cmH2O
  CPAP_EXP_RISE: 1.0,           // expiratory pressure rise, cmH2O
  // APRV
  APRV_SPONT_FREQ_HZ: 0.4,      // 24/min spontaneous breath ripple during P-high
  APRV_SPONT_RIPPLE_MAG: 0.6,   // cmH2O ripple amplitude
  // Pathology mechanics overrides
  ARDS_COMPLIANCE: 0.025,
  COPD_RESISTANCE: 25,
  OBSTRUCTIVE_RESISTANCE: 30,
  RESTRICTIVE_COMPLIANCE: 0.020,
  // Alarm thresholds
  PIP_ALARM: 35,                // cmH2O
  PPLAT_ALARM: 30,
  DRIVING_P_ALARM: 15,
  RAW_ALARM: 20,
};
// ---------- Patient trigger helpers ----------
// Returns the duration (in seconds) of the trigger detection phase.
function getTriggerDuration(trigSens, triggerType = "pressure") {
  if (triggerType === "autotrack") return CONSTANTS.TRIG_AUTOTRACK_FIXED;
  if (triggerType === "flow") {
    const t = CONSTANTS.TRIG_FLOW_MIN + ((trigSens - 0.5) / 9.5) * (CONSTANTS.TRIG_FLOW_MAX - CONSTANTS.TRIG_FLOW_MIN);
    return Math.max(CONSTANTS.TRIG_FLOW_MIN, Math.min(CONSTANTS.TRIG_FLOW_MAX, t));
  }
  // Pressure trigger
  const t = CONSTANTS.TRIG_PRESSURE_MIN + ((trigSens - 0.5) / 9.5) * (CONSTANTS.TRIG_PRESSURE_MAX - CONSTANTS.TRIG_PRESSURE_MIN);
  return Math.max(CONSTANTS.TRIG_PRESSURE_MIN, Math.min(CONSTANTS.TRIG_PRESSURE_MAX, t));
}
// Returns {dipP, dipFlow} signature of the patient's pre-trigger effort.
function patientTriggerEffort(t, tTrig, PEEP, sensitivity, triggerType = "pressure") {
  const progress = t / tTrig;
  if (triggerType === "flow") {
    return {
      dipP: -CONSTANTS.FLOW_TRIG_PRESSURE_DIP * progress,
      dipFlow: sensitivity * progress,
    };
  }
  if (triggerType === "autotrack") {
    const env = Math.sin(Math.PI * progress) * 0.7;
    return {
      dipP: -(CONSTANTS.AUTOTRACK_BASE_DIP + sensitivity * CONSTANTS.AUTOTRACK_DIP_PER_SENS) * env,
      dipFlow: -1.5 * env,
    };
  }
  // Pressure trigger (default)
  const effortP = CONSTANTS.PRESSURE_TRIG_BASE_DIP + sensitivity * CONSTANTS.PRESSURE_TRIG_DIP_PER_SENS;
  return {
    dipP: -effortP * progress,
    dipFlow: -3 * progress,
  };
}
// ---------- Pathology mechanics ----------
function applyPathologyMechanics(C, R, pathology) {
  let Ceff = C, Reff = R;
  if (pathology === "ARDS") Ceff = CONSTANTS.ARDS_COMPLIANCE;
  if (pathology === "COPD") Reff = CONSTANTS.COPD_RESISTANCE;
  if (pathology === "obstructive") Reff = CONSTANTS.OBSTRUCTIVE_RESISTANCE;
  if (pathology === "restrictive") Ceff = CONSTANTS.RESTRICTIVE_COMPLIANCE;

}
// ---------- Per-mode step functions ----------
// Each takes (s, sim, dt, Ceff, Reff) and returns { pressure, flow }.
// They mutate `sim.volume` and any mode-specific sim state.
// These are *pure* in the sense that they only depend on sim state and settings —
// no React, no DOM, no time outside `dt` and `sim.cycleT`.
function stepVC(s, sim, dt, Ceff, Reff) {
  const VtL = s.Vt / 1000;
  const inInsp = sim.cycleT <= s.ITime;
  let flow, pressure;
  if (inInsp) {
    flow = VtL / s.ITime;
    sim.volume += flow * dt;
  } else {
    const tau = Reff * Ceff;
    const tExp = sim.cycleT - s.ITime;
    if (tExp < dt * 1.5) sim.expStartV = sim.volume;
    sim.volume = sim.expStartV * Math.exp(-tExp / tau);
    flow = -sim.volume / tau;

function stepPC_PRVC(s, sim, dt, Ceff, Reff) {

  } else {
    drivingP = s.PIP - s.PEEP;
  }
  const inInsp = sim.cycleT <= s.ITime;
  let flow, pressure;
  if (inInsp) {
    const rise = Math.min(1, sim.cycleT / s.riseTime);
    const targetP = s.PEEP + drivingP * rise;
    flow = (targetP - sim.volume / Ceff - s.PEEP) / Reff;
    sim.volume += flow * dt;
    pressure = targetP;
  } else {
    const tExp = sim.cycleT - s.ITime;
    if (tExp < dt * 1.5) sim.expStartV = sim.volume;
    sim.volume = sim.expStartV * Math.exp(-tExp / tau);
    flow = -sim.volume / tau;
    pressure = sim.volume / Ceff + flow * Reff + s.PEEP;
  }
  return { pressure, flow };
}
function stepPS(s, sim, dt, Ceff, Reff) {
  const tau = Reff * Ceff;
  const drivingP = s.PIP - s.PEEP;
  const cyclePct = s.flowCyclePct / 100;
  const tTrig = getTriggerDuration(s.trigSens, s.triggerType);
  let flow, pressure;
  if (sim.cycleT < tTrig) {
    const { dipP, dipFlow } = patientTriggerEffort(sim.cycleT, tTrig, s.PEEP, s.trigSens, s.triggerType);
    pressure = s.PEEP + dipP;
    flow = dipFlow / 60;
    if (sim.cycleT < dt * 1.5) sim.volume = 0;
  } else {
    const tInsp = sim.cycleT - tTrig;
    const peakFlowExpected = drivingP / Reff;
    const cycleOffFlow = peakFlowExpected * cyclePct;
    if (tInsp < dt * 1.5) {
      sim.psInspActive = true;
      sim.expStartV = 0;
    }
    if (sim.psInspActive) {
      const rise = Math.min(1, tInsp / s.riseTime);
      const targetP = s.PEEP + drivingP * rise;
      flow = (targetP - sim.volume / Ceff - s.PEEP) / Reff;
      sim.volume += flow * dt;
      pressure = targetP;
      if (rise >= 1 && flow <= cycleOffFlow) {
        sim.psInspActive = false;
        sim.expStartV = sim.volume;
        sim.psExpStartT = sim.cycleT;
      }
    } else {
      const tExp = sim.cycleT - sim.psExpStartT;
      sim.volume = sim.expStartV * Math.exp(-tExp / tau);
      flow = -sim.volume / tau;
      pressure = sim.volume / Ceff + flow * Reff + s.PEEP;

function stepCPAP(s, sim, dt, Ceff, Reff) {
  const tau = Reff * Ceff;
  const cycle = 60 / s.RR;
  const tTrig = getTriggerDuration(s.trigSens, s.triggerType);
  const inInsp = sim.cycleT <= s.ITime;
  let flow, pressure;
  if (inInsp) {
    const phase = (sim.cycleT / s.ITime) * Math.PI;
    const muscleP = -CONSTANTS.CPAP_EFFORT_PRESSURE * Math.sin(phase);
    flow = (s.PEEP - muscleP - sim.volume / Ceff) / Reff;
    sim.volume += flow * dt;
    pressure = s.PEEP + (muscleP / CONSTANTS.CPAP_EFFORT_PRESSURE) * CONSTANTS.CPAP_COMPENSATION_GAP;
    if (sim.cycleT < tTrig) {
      const prog = sim.cycleT / tTrig;
      const triggerDip = -(CONSTANTS.PRESSURE_TRIG_BASE_DIP + s.trigSens * CONSTANTS.PRESSURE_TRIG_DIP_PER_SENS) * Math.sin(Math.PI * prog);
      pressure += triggerDip;
    }
  } else {
    const tExp = sim.cycleT - s.ITime;
    const eTime = cycle - s.ITime;
    if (tExp < dt * 1.5) sim.expStartV = sim.volume;
    sim.volume = sim.expStartV * Math.exp(-tExp / tau);
    flow = -sim.volume / tau;
    const phase = (tExp / eTime) * Math.PI;
    pressure = s.PEEP + CONSTANTS.CPAP_EXP_RISE * Math.sin(phase);
  }
  return { pressure, flow };
}
function stepAPRV(s, sim, dt, Ceff, Reff) {
  const Phigh = s.aprvPhigh;
  const Plow = s.aprvPlow;
  const Thigh = s.aprvThigh;
  const Tlow = s.aprvTlow;
  const aprvCycle = Thigh + Tlow;
  sim.aprvPhase = (sim.aprvPhase + dt) % aprvCycle;
  const tau = Reff * Ceff;
  const Vlow_eq = Ceff * Plow;
  let flow, pressure;
  if (sim.aprvPhase < Thigh) {
    const inP = sim.aprvPhase;
    const sp = 2 * Math.PI * CONSTANTS.APRV_SPONT_FREQ_HZ * inP;
    const spontRipple = s.aprvSpontEnabled ? CONSTANTS.APRV_SPONT_RIPPLE_MAG * Math.sin(sp) : 0;
    const targetP = Phigh + spontRipple;
    flow = (targetP - sim.volume / Ceff) / Reff;
    sim.volume += flow * dt;
    pressure = targetP;
  } else {
    const inR = sim.aprvPhase - Thigh;
    if (inR < dt * 1.5) sim.expStartV = sim.volume;
    sim.volume = Vlow_eq + (sim.expStartV - Vlow_eq) * Math.exp(-inR / tau);
    flow = -(sim.volume - Vlow_eq) / tau;
    pressure = sim.volume / Ceff + flow * Reff;

    const mandT = sim.simvT;
    const inMandInsp = mandT <= s.ITime;

      if (inMandInsp) {
        flow = (s.Vt / 1000) / s.ITime;
        sim.volume += flow * dt;
      } else {
        if (mandT - s.ITime < dt * 1.5) sim.expStartV = sim.volume;
        sim.volume = sim.expStartV * Math.exp(-(mandT - s.ITime) / tau);
        flow = -sim.volume / tau;
      }
      pressure = sim.volume / Ceff + flow * Reff + s.PEEP;
    } else {
      const drivingP = s.PIP - s.PEEP;
      if (inMandInsp) {
        const rise = Math.min(1, mandT / s.riseTime);
        const targetP = s.PEEP + drivingP * rise;
        flow = (targetP - sim.volume / Ceff - s.PEEP) / Reff;
        sim.volume += flow * dt;
        pressure = targetP;
      } else {
        if (mandT - s.ITime < dt * 1.5) sim.expStartV = sim.volume;
        sim.volume = sim.expStartV * Math.exp(-(mandT - s.ITime) / tau);

        pressure = sim.volume / Ceff + flow * Reff + s.PEEP;

      flow = dipFlow / 60;
      if (psT < dt * 1.5) sim.volume = 0;

      const tInsp = psT - tTrig;
      if (tInsp < psI) {

        const targetP = s.PEEP + drivingP * rise;

        sim.volume += flow * dt;

const MODE_STEPPERS = {

  PC: stepPC_PRVC,
  PRVC: stepPC_PRVC,
  PS: stepPS,
  CPAP: stepCPAP,
  APRV: stepAPRV,
  "SIMV-VC": stepSIMV,

// ---------- Pathology overlay ----------
// Applies after the mode step. Mutates pressure/flow in place (returns new values).
function applyPathologyOverlay(s, sim, pressure, flow, Ceff, Reff) {
  const cycle = 60 / s.RR;
  const inInsp = sim.cycleT <= s.ITime;
  const eTime = cycle - s.ITime;
  const tExp = sim.cycleT - s.ITime;
  switch (s.pathology) {
    case "autoPEEP": {
      if (!inInsp && tExp > eTime * 0.7) flow = Math.min(flow, -0.05);
      break;
    }
    case "flowStarvation": {
      if (s.mode === "VC" && inInsp) {
        const localT = sim.cycleT / s.ITime;
        pressure -= 4 * Math.sin(Math.PI * localT) * Math.exp(-localT * 0.5);

      break;

    case "ineffectiveEffort": {
      if (!inInsp) {

          const lt = tExp - eOff;
          if (Math.abs(lt) < 0.18) {
            const env = Math.exp(-Math.pow(lt / 0.08, 2));
            pressure -= 2.5 * env;
            flow += 0.12 * env;
          }
        }

      break;

    case "autoTrigger": {
      if (!inInsp && tExp > 0.2 && tExp < eTime - 0.2) {
        pressure += 1.2 * Math.sin(2 * Math.PI * 3 * tExp);
        flow += 0.05 * Math.sin(2 * Math.PI * 3 * tExp);

      break;

    case "triggerDelay": {
      if (inInsp && sim.cycleT < 0.25) {
        const env = Math.exp(-Math.pow((sim.cycleT - 0.12) / 0.06, 2));
        pressure = s.PEEP - 4 * env;
        flow = 0;
      }
      break;

    case "reverseTrigger": {
      if (!inInsp) {
        const lt = tExp - eTime * 0.25;
        if (Math.abs(lt) < 0.20) {
          const env = Math.exp(-Math.pow(lt / 0.10, 2));
          pressure -= 4 * env;
          flow += 0.18 * env;

      break;

    case "doubleTrigger": {
      // After end-of-inspiration, immediately deliver a second stacked breath
      if (!inInsp && tExp < 0.5) {
        const stackT = tExp;

        const tau = Reff * Ceff;
        const stackedFlow = (drivingP / Reff) * Math.exp(-stackT / tau) * 0.85;

        flow += 0.20 * env;

      break;

      break;

/**
 * Ventilator Waveform Engine
 * --------------------------------
 * Real-time, physiologically-faithful pressure / flow / volume traces driven
 * from the equation of motion:
 *
 *     P_aw(t) = (V(t) / C) + (Flow(t) · R) + PEEP
 *
 * Where:
 *   C = lung-thorax compliance (L/cmH₂O)
 *   R = airway resistance (cmH₂O/L/sec)
 *   V = lung volume above FRC (L)
 *   F = flow (L/sec)

    flow: "#34d399",
    volume: "#60a5fa",
    selectBg: "#0f172a",
  },
  light: {

    textMuted: "#57534e",

    tickText: "#78716c",
    accent: "#b45309",       // burnt amber for light
    accentInk: "#fafaf7",
    accentSoft: "rgba(180, 83, 9, 0.85)",

// ---------- Real-time sweeping plot (Canvas) ----------
function WaveformPlot({

}) {
  const canvasRef = useRef(null);

    // stretched horizontally when the iframe is wider than the 720px design width.
    // The buffer is resized on layout changes via ResizeObserver below; the draw()
    // closure picks up the new W / innerW values on the next animation frame.
    let W = Math.max(360, cvs.clientWidth || 720);
    let innerW = W - padL - padR;
    sizeRef.current = { W, innerW };
    const sizeCanvas = () => { cvs.width = W * dpr; cvs.height = H * dpr; };

        const newW = Math.max(360, cvs.clientWidth || W);

          innerW = W - padL - padR;
          sizeRef.current = { W, innerW };
          sizeCanvas();
          ctx.scale(dpr, dpr);

      ro.observe(cvs);

    const x = (t) => padL + (t / windowSec) * innerW;
    const y = (v) => padT + innerH - ((v - yMin) / (yMax - yMin)) * innerH;
    let raf;
    const draw = () => {
      // Clear
      ctx.fillStyle = theme.surface;
      ctx.fillRect(0, 0, W, H);
      // Grid
      ctx.strokeStyle = theme.grid;
      ctx.lineWidth = 0.5;
      const yTicks = 4;
      for (let i = 0; i <= yTicks; i++) {
        const yy = padT + (innerH * i) / yTicks;
        ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(W - padR, yy); ctx.stroke();
      }

function detectWaveformFeatures(bufferRef, mode, settings) {

  const N = tBuf.length;
  // Build a list of valid (t, P, F, V) samples in time order.
  // Buffer is circular so we sort by t.
  const valid = [];
  for (let i = 0; i < N; i++) {
    if (tBuf[i] === null || tBuf[i] === undefined || isNaN(tBuf[i])) continue;
    valid.push({ t: tBuf[i], P: P[i], F: F[i], V: V[i] });
  }
  valid.sort((a, b) => a.t - b.t);

  let pipIdx = 0;
  for (let i = 0; i < valid.length; i++) {
    if (valid[i].P > valid[pipIdx].P) pipIdx = i;
  }
  const pip = valid[pipIdx];
  // Plateau pressure: pressure ~5 samples after PIP (when flow has decelerated)
  // Only meaningful if mode is PC/PRVC/PS (decelerating flow naturally yields plateau)
  let plat = null;
  if (["PC", "PRVC", "PS", "SIMV-PC"].includes(mode)) {

    plat = valid[platIdx];
  }

  for (let i = 0; i < valid.length; i++) {
    if (valid[i].F > valid[peakInspIdx].F) peakInspIdx = i;
  }
  const peakInsp = valid[peakInspIdx];
  // Peak expiratory flow (most negative F)
  let peakExpIdx = 0;
  for (let i = 0; i < valid.length; i++) {
    if (valid[i].F < valid[peakExpIdx].F) peakExpIdx = i;
  }

      description: "Peak inspiratory pressure — highest airway pressure during inspiration. Includes both elastic recoil and resistive components. Alarm if >35 cmH₂O.",
      kind: pip.P > 35 ? "alarm" : "primary",
    },
  ];

    pressure.push({
      tSec: plat.t, value: plat.P, label: "P-plat",
      description: "Plateau pressure — static recoil pressure of the lung at end-inspiration when flow is zero. Reflects elastic loading only. Target ≤30 cmH₂O in ARDS.",
      kind: plat.P > 30 ? "alarm" : "primary",
    });

    tSec: lastSample.t, value: peepValue, label: "PEEP",
    description: "Positive end-expiratory pressure — pressure maintained at end of expiration to prevent alveolar collapse.",
    kind: "secondary",
  });

    {
      tSec: peakInsp.t, value: peakInsp.F, label: "Peak insp",
      description: "Peak inspiratory flow rate. In VC this equals the set flow (square wave). In PC/PS it's highest at start of inspiration and decelerates.",
      kind: "primary",
    },
    {
      tSec: peakExp.t, value: peakExp.F, label: "Peak exp",
      description: "Peak expiratory flow rate (most negative). Driven by elastic recoil; magnitude depends on tidal volume and time constant.",
      kind: "primary",
    },

    flow.push({
      tSec: lastSample.t, value: lastSample.F, label: "Flow ≠ 0",
      description: "End-expiratory flow has not returned to zero — incomplete exhalation suggests auto-PEEP / gas trapping. Common in COPD or with insufficient expiratory time.",
      kind: "alarm",

    sim.psInspActive = false;
    sim.psExpStartT = 0;
    sim.breathPmax = -Infinity;
    sim.breathPmin = Infinity;
    sim.breathPsum = 0;
    sim.breathPsamples = 0;
    sim.breathFmax = -Infinity;
    sim.breathFmin = Infinity;
    sim.breathVmax = 0;
    sim.breathEndInspP = 0;
    // Clear trends so old-mode values don't bleed into the new mode's trend graph
    const blank = {
      PIP: new Array(TRENDS_LEN).fill(null),
      VtExp: new Array(TRENDS_LEN).fill(null),
      Cdyn: new Array(TRENDS_LEN).fill(null),
      Pmean: new Array(TRENDS_LEN).fill(null),
    };
    trendsRef.current = blank;
    setTrends(blank);
  }, [mode]);
  // ---- Hold maneuver triggers ----
  // ---- Share handler ----
  // Encodes current settings into URL, copies to clipboard, shows confirmation.
  const [shareCopied, setShareCopied] = useState(false);
  const handleShare = async () => {
    const url = encodeStateToUrl({
      mode, Vt, RR, ITime, PEEP, PIP, C, R, riseTime, flowCyclePct, trigSens,
      triggerType, FiO2, pathology,
      aprvPhigh, aprvPlow, aprvThigh, aprvTlow, aprvSpontEnabled,
      themeName,
    });
    try {
      await navigator.clipboard.writeText(url);
      setShareCopied(true);
      setTimeout(() => setShareCopied(false), 2000);
    } catch {
      // Fallback — show prompt if clipboard API unavailable
      window.prompt("Copy this share link:", url);
    }
  };
  const triggerHold = (which) => {
    if (holdMode === which) {
      holdRef.current = { mode: null, startedAt: null };
      setHoldMode(null);
      return;
    }
    holdRef.current = { mode: which, startedAt: performance.now(), captured: false, value: null, pending: true };
    setHoldMode(which);
    // Allow up to one full breath cycle for the hold to engage at the right
    // moment (end-inspiration or end-expiration), then hold for HOLD_DURATION_SEC
    const cycle = 60 / RR;
    const totalHoldMs = (cycle + CONSTANTS.HOLD_DURATION_SEC) * 1000;
    setTimeout(() => {
      const captured = holdRef.current.value;
      const label = which === "insp" ? "P-plat" : "Total PEEP";
      setHoldResult({ type: which, value: captured, label });
      // Update measurements panel with hold-derived values
      if (captured !== null && captured !== undefined) {
        const m = measurementsRef.current;
        if (which === "insp") {
          // Cstat = Vt / (Pplat - PEEP)
          const Cstat = m.VtExp / Math.max(0.1, captured - PEEP);
          // Refine Raw with true Pplat
          const Raw = m.peakInspFlow > 0 ? (m.PIP - captured) / (m.peakInspFlow / 60) : null;
          const next = { ...m, Pplat: captured, Cstat, Raw };
          measurementsRef.current = next;
          setMeasurements(next);
        } else {
          // exp hold reveals total PEEP — auto-PEEP component is captured separately
          // Already shown in holdResult; no need to change panel
        }
      }
      holdRef.current = { mode: null, startedAt: null };
      setHoldMode(null);
    }, totalHoldMs);
  };
  return (
    <div className="min-h-screen w-full" style={{ background: theme.bg, fontFamily: "ui-serif, Georgia, serif", color: theme.text }}>

              <div className="text-[10px] tracking-[0.3em] font-mono uppercase mb-1" style={{ color: theme.accentSoft }}>
                Equation of Motion · Live
              </div>
              <h1 className="text-2xl sm:text-3xl font-semibold tracking-tight" style={{ color: theme.text }}>
                Ventilator Waveform Engine
              </h1>
            </div>
            <div className="flex flex-wrap items-center gap-2 sm:gap-3">
              <div className="hidden lg:block text-right text-[10px] font-mono leading-tight" style={{ color: theme.textMuted }}>
                <span style={{ color: theme.accent }}>● LIVE</span> &nbsp; P<sub>aw</sub> = V/C + Flow·R + PEEP<br/>
                <span style={{ color: theme.textFaint }}>
                  {windowSec}s window · streaming
                </span>
              </div>
              <button
                onClick={handleShare}
                className="px-3 py-1.5 text-[10px] font-mono tracking-widest uppercase border transition-all"
                style={{
                  background: shareCopied ? theme.accent : "transparent",
                  color: shareCopied ? theme.accentInk : theme.textMuted,
                  borderColor: shareCopied ? theme.accent : theme.border,
                }}
                aria-label="Share current preset"
              >
                {shareCopied ? "✓ Copied" : "↗ Share"}
              </button>
              <button
                onClick={() => exportWaveformsToPng({
                  bufferRef, sweepRef, theme, mode, windowSec,
                  Pmax, Fabs, Vmax,
                  settings: settingsRef.current,
                  measurements,
                })}
                className="px-3 py-1.5 text-[10px] font-mono tracking-widest uppercase border transition-all"
                style={{
                  background: "transparent",
                  color: theme.textMuted,
                  borderColor: theme.border,
                }}
                aria-label="Export PNG"
              >
                ⬇ PNG
              </button>
              <button
                onClick={() => setPaused(!paused)}
                className="px-3 py-1.5 text-[10px] font-mono tracking-widest uppercase border transition-all"
                style={{
                  background: paused ? theme.accent : "transparent",
                  color: paused ? theme.accentInk : theme.textMuted,
                  borderColor: paused ? theme.accent : theme.border,
                }}
                aria-label={paused ? "Resume" : "Pause"}
              >
                {paused ? "▶ Resume" : "⏸ Pause"}
              </button>
              <button
                onClick={() => setThemeName(themeName === "dark" ? "light" : "dark")}
                className="px-3 py-1.5 text-[10px] font-mono tracking-widest uppercase border transition-all"
                style={{
                  background: "transparent",
                  color: theme.textMuted,
                  borderColor: theme.border,
                }}
                aria-label="Toggle theme"
              >
                {themeName === "dark" ? "☀ Light" : "☾ Dark"}
              </button>
            </div>
          </div>
        </header>
        {/* Mode + Pathology selector */}
        <div className="flex flex-wrap gap-3 mb-5 items-center">

                <option value="PRVC">Pressure-Regulated Volume Control (PRVC)</option>

              <span style={{ color: theme.accent, fontWeight: 700 }}>TIP</span> · T-low should terminate when expiratory flow reaches 50–75% of peak (prevents derecruitment). Watch the flow trace during release: T-low {aprvTlow.toFixed(2)}s = {(aprvTlow / (Math.max(0.001, R * C))).toFixed(1)}× time constant. Typical APRV uses 1 RC time constant (~0.5–0.75s).
            </div>
          </div>

                 style={{ background: theme.accent, color: theme.accentInk }}>
              <span>⏸ Paused</span>
              <span className="text-[8px] tracking-normal normal-case opacity-80">hover to inspect</span>
            </div>
          )}
          <div className="border-b" style={{ borderColor: theme.border }}>
            <WaveformPlot bufferRef={bufferRef} sweepRef={sweepRef} crosshairRef={crosshairRef}
                          channel="P" color={theme.pressure}
                          yLabel="PRESSURE  cmH₂O" yMin={0} yMax={Pmax} theme={theme} windowSec={windowSec}
                          onHoverMove={paused ? handleCrosshairMove : null}
                          onHoverLeave={paused ? handleCrosshairLeave : null} />
          </div>
          <div className="border-b" style={{ borderColor: theme.border }}>
            <WaveformPlot bufferRef={bufferRef} sweepRef={sweepRef} crosshairRef={crosshairRef}
                          channel="F" color={theme.flow}
                          yLabel="FLOW  L/min" yMin={-Fabs} yMax={Fabs} theme={theme} windowSec={windowSec}
                          onHoverMove={paused ? handleCrosshairMove : null}
                          onHoverLeave={paused ? handleCrosshairLeave : null} />
          </div>
          <div>
            <WaveformPlot bufferRef={bufferRef} sweepRef={sweepRef} crosshairRef={crosshairRef}
                          channel="V" color={theme.volume}
                          yLabel="VOLUME  mL" yMin={0} yMax={Vmax} theme={theme} windowSec={windowSec}
                          onHoverMove={paused ? handleCrosshairMove : null}
                          onHoverLeave={paused ? handleCrosshairLeave : null} />
          </div>
        </div>
        {/* Live measurements panel */}
        <div className="mt-4 rounded-sm border overflow-hidden" style={{ background: theme.surface, borderColor: theme.border }}>
          <div className="flex items-center justify-between px-4 py-2 border-b" style={{ borderColor: theme.border, background: theme.surfaceAlt }}>
            <div className="flex items-center gap-2">
              <span className="inline-block w-1.5 h-1.5 rounded-full" style={{ background: theme.accent, boxShadow: `0 0 8px ${theme.accent}` }} />
              <span className="text-[10px] tracking-[0.25em] uppercase font-mono" style={{ color: theme.text }}>
                Measured Values
              </span>
              <span className="text-[9px] font-mono ml-2" style={{ color: theme.textFaint }}>
                updates per breath
              </span>
            </div>
            <span className="hidden sm:inline text-[9px] font-mono" style={{ color: theme.textFaint }}>
              Set RR {RR}/min · Set Vt {Vt} mL · {mode}
            </span>
          </div>
          {/* Pressure metrics */}
          <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-x-2 gap-y-2 p-3 border-b" style={{ borderColor: theme.border }}>
            <Stat label="PIP" value={measurements.PIP} unit="cmH₂O" theme={theme} color={theme.pressure}

            <Stat label="P-plat" value={measurements.Pplat} unit="cmH₂O" theme={theme} color={theme.pressure}
                  alert={measurements.Pplat > 30}

            <Stat label="ΔP (driving)" value={measurements.Pplat ? measurements.Pplat - PEEP : measurements.PIP - PEEP} unit="cmH₂O" theme={theme} color={theme.pressure}
                  alert={(measurements.Pplat ? measurements.Pplat - PEEP : measurements.PIP - PEEP) > 15}

        {/* Trends panel — last N breaths */}
        {(() => {

          const effectiveRR = measurements.measuredRR > 0 ? measurements.measuredRR : RR;
          const validBreaths = trends.PIP.filter(v => v !== null).length;
          const trendWindowSec = validBreaths > 0 ? (validBreaths * 60) / effectiveRR : 0;
          const windowLabel = trendWindowSec >= 60

          return (

                <Slider label="Tidal Vol" unit="mL" value={Vt} min={200} max={800} step={10} onChange={setVt} theme={theme} tooltipKey="Vt" />
                <Slider label="Resp Rate" unit="/min" value={RR} min={8} max={35} step={1} onChange={setRR} theme={theme} tooltipKey="RR" />
                <Slider label="I-Time" unit="s" value={ITime} min={0.5} max={2.0} step={0.1} onChange={setITime} theme={theme} tooltipKey="ITime" />
                <Slider label="PEEP" unit="cmH₂O" value={PEEP} min={0} max={20} step={1} onChange={setPEEP} theme={theme} tooltipKey="PEEP" />
                <Slider label="PIP (PC/PS)" unit="cmH₂O" value={PIP} min={10} max={45} step={1} onChange={setPIP} theme={theme} tooltipKey="PIP" />
                <Slider label="Rise Time" unit="s" value={riseTime} min={0.05} max={0.5} step={0.05} onChange={setRiseTime} theme={theme} tooltipKey="riseTime" />
                <Slider label="Flow Cycle" unit="% peak" value={flowCyclePct} min={5} max={50} step={5} onChange={setFlowCyclePct} theme={theme} tooltipKey="flowCyclePct" />
                <Slider label="Trig Sens" unit={triggerType === "pressure" ? "cmH₂O" : "L/min"} value={trigSens} min={0.5} max={10} step={0.5} onChange={setTrigSens} theme={theme} tooltipKey="trigSens" />
              </>
            )}
          </div>
          {/* Trigger type selector */}
          {mode !== "APRV" && (
            <div className="flex flex-wrap items-center gap-3 mt-5 pt-4 border-t" style={{ borderColor: theme.border }}>
              <span className="text-[10px] tracking-[0.2em] uppercase font-mono" style={{ color: theme.textFaint }}>
                Trigger Type
              </span>
              {[
                { id: "pressure", label: "Pressure", hint: "−1 to −2 cmH₂O" },
                { id: "flow", label: "Flow", hint: "1–10 L/min" },
                { id: "autotrack", label: "Auto-Trak", hint: "Shape-recognition" },
              ].map((t) => {
                const active = triggerType === t.id;
                return (
                  <button
                    key={t.id}
                    onClick={() => setTriggerType(t.id)}
                    className="px-3 py-1.5 text-xs font-mono tracking-widest uppercase border transition-all flex flex-col items-start"
                    style={{
                      background: active ? theme.accent : "transparent",
                      color: active ? theme.accentInk : theme.text,
                      borderColor: active ? theme.accent : theme.border,
                    }}
                  >
                    <span>{t.label}</span>
                    <span className="text-[8px] tracking-normal normal-case mt-0.5"
                          style={{ color: active ? theme.accentInk : theme.textFaint, opacity: 0.85 }}>
                      {t.hint}
                    </span>
                  </button>
                );
              })}
            </div>
          )}
          <div className="text-[10px] tracking-[0.2em] uppercase font-mono mt-6 mb-3" style={{ color: theme.textFaint }}>
            Other
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-x-6 gap-y-5">
            <Slider label="FiO₂" unit="%" value={FiO2} min={21} max={100} step={1} onChange={setFiO2} theme={theme} tooltipKey="FiO2" />
          </div>
        </div>
        {/* Patient Mechanics — separate card, different visual treatment */}
        <div className="mt-4 p-5 rounded-sm border-l-4" style={{ background: theme.surface, borderColor: theme.border, borderLeftColor: theme.flow }}>
          <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-2">
              <span className="text-[10px] tracking-[0.25em] uppercase font-mono" style={{ color: theme.flow }}>
                Patient Mechanics
              </span>
              <span className="text-[9px] font-mono" style={{ color: theme.textFaint }}>
                simulated lung — not vent controls
              </span>
            </div>
            <span className="text-[9px] font-mono tabular-nums" style={{ color: theme.textFaint }}>
              τ = R·C = {(C * R).toFixed(2)}s
            </span>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-x-6 gap-y-5">
            <Slider label="Compliance" unit="L/cmH₂O" value={C} min={0.015} max={0.10} step={0.005} onChange={setC} theme={theme} tooltipKey="C" />
            <Slider label="Resistance" unit="cmH₂O/L/s" value={R} min={5} max={30} step={1} onChange={setR} theme={theme} tooltipKey="R" />
          </div>
        </div>
        {/* Footer */}
        <div className="mt-6 text-[11px] font-mono leading-relaxed pt-4 border-t"
             style={{ color: theme.textFaint, borderColor: theme.border }}>
          <span style={{ color: theme.accentSoft }}>NOTE</span> · Educational use. Single-compartment lung model rendered in real time. Inspiratory hold measures plateau pressure for static compliance; expiratory hold measures total PEEP to detect intrinsic PEEP (auto-PEEP).
        </div>
      </div>
    </div>
  );
}
    // Mount
    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(VentilatorWaveforms)
    );
  </script>
</body>
</html>
