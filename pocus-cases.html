<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ECU Med-Peds POCUS Program</title>
<style>
  /* ────────────────────────────────────────────────────────
     ECU Brand System
     Pirate Purple: #592A8A   Pirate Gold: #FFC72C
     ──────────────────────────────────────────────────────── */

  /* Default = dark theme */
  :root, [data-theme="dark"] {
    --bg: #07090f;
    --bg-2: #0d1119;
    --panel: #131826;
    --panel-2: #181f30;
    --panel-3: #1d2538;
    --line: #232b40;
    --line-2: #2d3650;
    --text: #ecedf5;
    --text-dim: #9aa3bb;
    --text-faint: #5f6886;

    /* ECU brand */
    --ecu-purple: #6b3aa6;       /* tuned brighter than #592A8A for dark legibility */
    --ecu-purple-2: #8b58cc;     /* hover */
    --ecu-purple-deep: #2b1448;
    --ecu-gold: #ffc72c;          /* used for backgrounds + dark-mode text */
    --ecu-gold-2: #ffd45a;
    --ecu-gold-deep: #5a4400;
    --gold-text: #ffc72c;         /* gold for TEXT — dark theme uses bright */

    /* Semantic */
    --accent: var(--ecu-purple-2);
    --accent-2: var(--ecu-gold);
    --good: #2dd4bf;
    --warn: #ffc72c;
    --bad: #f87171;

    /* Theme-specific surfaces & FX */
    --silhouette-fill: #181f30;
    --topbar-bg: linear-gradient(180deg, rgba(43, 20, 72, 0.45) 0%, rgba(13, 17, 25, 0.95) 100%);
    --hero-glow: radial-gradient(ellipse at top, rgba(107, 58, 166, 0.10) 0%, transparent 55%);
    --pulse-line: #ffc72c;

    --radius: 10px;
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.35);
    --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
  }

  /* Light theme */
  [data-theme="light"] {
    --bg: #f7f7fb;
    --bg-2: #eef0f5;
    --panel: #ffffff;
    --panel-2: #f3f4f8;
    --panel-3: #e6e9f1;
    --line: #d8dce6;
    --line-2: #c1c6d3;
    --text: #18203a;
    --text-dim: #4f5872;
    --text-faint: #7e879d;

    --ecu-purple: #592A8A;       /* ECU's actual purple, vivid on white */
    --ecu-purple-2: #7344b5;
    --ecu-purple-deep: #2b1448;
    --ecu-gold: #ffc72c;
    --ecu-gold-2: #ffd860;
    --ecu-gold-deep: #6b5300;
    --gold-text: #8a6800;        /* darker amber for legibility on white */

    --accent: var(--ecu-purple);
    --accent-2: var(--ecu-gold);
    --good: #0d9488;
    --warn: #b45309;
    --bad: #dc2626;

    --silhouette-fill: #d8dce6;  /* light gray silhouette stands out on white */
    --topbar-bg: linear-gradient(180deg, #ffffff 0%, #f7f7fb 100%);
    --hero-glow: radial-gradient(ellipse at top, rgba(89, 42, 138, 0.07) 0%, transparent 55%);
    --pulse-line: #8a6800;

    --shadow-md: 0 2px 12px rgba(89, 42, 138, 0.10);
    --shadow-lg: 0 8px 28px rgba(89, 42, 138, 0.15);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  body {
    background: var(--hero-glow), var(--bg);
    transition: background-color 0.2s, color 0.2s;
  }
  a { color: var(--ecu-purple-2); text-decoration: none; }
  a:hover { color: var(--gold-text); }
  button { font-family: inherit; cursor: pointer; }
  ::selection { background: var(--ecu-purple); color: white; }

  /* ── Top bar ───────────────────────────────────────────── */
  header.topbar {
    display: flex; align-items: center; gap: 1.25rem;
    padding: 0.85rem 1.5rem;
    border-bottom: 1px solid var(--line);
    background: var(--topbar-bg);
    backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 50;
  }
  header.topbar .brand {
    display: flex; align-items: center; gap: 0.7rem;
    text-decoration: none; color: var(--text);
  }
  header.topbar .brand svg.mark { width: 30px; height: 30px; flex-shrink: 0; }
  header.topbar .brand .wordmark {
    display: flex; flex-direction: column; line-height: 1.1;
  }
  header.topbar .brand .wordmark .top {
    font-weight: 700; font-size: 0.92rem; letter-spacing: 0.02em;
  }
  header.topbar .brand .wordmark .top .ecu {
    color: var(--gold-text); font-weight: 800;
  }
  header.topbar .brand .wordmark .top .pocus {
    color: var(--text);
  }
  header.topbar .brand .wordmark .sub {
    font-size: 0.68rem; color: var(--text-faint); letter-spacing: 0.12em;
    text-transform: uppercase; margin-top: 1px;
  }
  header.topbar .crumbs {
    color: var(--text-dim); font-size: 0.88rem; flex: 1;
    border-left: 1px solid var(--line); padding-left: 1.25rem;
  }
  header.topbar .crumbs .chief {
    color: var(--gold-text); font-weight: 600; font-size: 0.7rem;
    text-transform: uppercase; letter-spacing: 0.1em;
    background: rgba(255, 199, 44, 0.1); padding: 0.2rem 0.55rem;
    border: 1px solid rgba(255, 199, 44, 0.3); border-radius: 3px;
    margin-right: 0.55rem;
  }
  header.topbar button.ghost {
    background: transparent; border: 1px solid var(--line-2); color: var(--text-dim);
    padding: 0.45rem 0.9rem; border-radius: 6px; font-size: 0.85rem;
    transition: all 0.15s;
  }
  header.topbar button.ghost:hover {
    color: var(--gold-text); border-color: var(--ecu-gold);
    background: rgba(255, 199, 44, 0.05);
  }
  header.topbar .topbar-actions {
    display: flex; align-items: center; gap: 0.55rem;
    margin-left: auto;
  }
  header.topbar .theme-toggle {
    width: 36px; height: 36px; border-radius: 7px;
    background: transparent; border: 1px solid var(--line-2);
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; padding: 0;
  }
  header.topbar .theme-toggle:hover {
    color: var(--gold-text); border-color: var(--ecu-gold);
    background: rgba(255, 199, 44, 0.05);
  }
  header.topbar .theme-toggle svg { width: 18px; height: 18px; }
  /* Sun icon shown in dark mode (click to go light); moon in light mode */
  .theme-toggle .icon-moon { display: none; }
  [data-theme="light"] .theme-toggle .icon-sun { display: none; }
  [data-theme="light"] .theme-toggle .icon-moon { display: block; }

  /* ── Home view ─────────────────────────────────────────── */
  .home { max-width: 1180px; margin: 0 auto; padding: 0 2rem 4rem; }

  .hero {
    padding: 3.5rem 0 2rem;
    border-bottom: 1px solid var(--line);
    margin-bottom: 2.5rem;
  }
  .hero .program-tag {
    display: inline-flex; align-items: center; gap: 0.45rem;
    color: var(--gold-text); font-size: 0.74rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.18em;
    margin-bottom: 1rem;
  }
  .hero .program-tag::before {
    content: ''; width: 24px; height: 1px; background: var(--ecu-gold);
  }
  .hero h1 {
    font-size: 2.4rem; font-weight: 700; margin: 0 0 0.5rem;
    letter-spacing: -0.02em; line-height: 1.15;
  }
  .hero h1 .accent { color: var(--gold-text); }
  .hero .lede {
    color: var(--text-dim); font-size: 1.05rem; line-height: 1.6;
    max-width: 64ch; margin: 0 0 1.75rem;
  }
  .hero .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem; max-width: 720px;
  }
  .hero .stat {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 0.95rem 1.1rem;
    border-left: 3px solid var(--ecu-purple-2);
  }
  .hero .stat .num {
    font-size: 1.6rem; font-weight: 700; color: var(--gold-text); line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .hero .stat .label {
    font-size: 0.72rem; color: var(--text-faint);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: 0.45rem; display: block;
  }

  .chief-section { margin-bottom: 2.5rem; }
  .chief-header {
    display: flex; align-items: baseline; gap: 0.85rem;
    margin-bottom: 1rem; padding-bottom: 0.55rem; border-bottom: 1px solid var(--line);
  }
  .chief-header h2 {
    font-size: 1.1rem; margin: 0; font-weight: 700; letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 0.55rem;
  }
  .chief-header h2::before {
    content: ''; width: 4px; height: 18px; background: var(--ecu-gold); border-radius: 2px;
  }
  .chief-header .count {
    color: var(--text-faint); font-size: 0.78rem; letter-spacing: 0.06em;
    text-transform: uppercase; font-weight: 500;
  }
  .case-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 0.95rem;
  }
  .case-card {
    position: relative; overflow: hidden;
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 1.1rem 1.2rem 1.2rem; text-align: left; color: inherit; cursor: pointer;
    transition: all 0.18s ease;
    display: flex; flex-direction: column; gap: 0.4rem; min-height: 160px;
  }
  .case-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--ecu-purple-2); opacity: 0; transition: opacity 0.18s;
  }
  .case-card:hover {
    border-color: var(--ecu-purple-2); transform: translateY(-2px);
    background: var(--panel-2); box-shadow: var(--shadow-md);
  }
  .case-card:hover::before { opacity: 1; }
  .case-card .card-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.2rem;
  }
  .case-card .num {
    color: var(--text-faint); font-size: 0.7rem; letter-spacing: 0.12em;
    text-transform: uppercase; font-weight: 600;
  }
  .case-card .check-mark {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--ecu-gold); color: var(--bg);
    font-size: 0.65rem; font-weight: 800;
    display: none; align-items: center; justify-content: center;
  }
  .case-card.completed .check-mark { display: flex; }
  .case-card .title {
    font-weight: 600; font-size: 1rem; line-height: 1.35;
    margin: 0.15rem 0 0.4rem;
  }
  .case-card .demo {
    color: var(--text-dim); font-size: 0.83rem; line-height: 1.45;
    flex: 1;
  }
  .case-card .footer {
    display: flex; align-items: center; gap: 0.4rem;
    margin-top: 0.6rem; padding-top: 0.55rem;
    border-top: 1px solid var(--line);
    color: var(--text-faint); font-size: 0.75rem;
  }
  .case-card .footer .scan-count {
    color: var(--ecu-purple-2); font-weight: 600;
  }
  .case-card .footer .arrow {
    margin-left: auto; transition: transform 0.18s; color: var(--gold-text);
  }
  .case-card:hover .footer .arrow { transform: translateX(3px); }

  /* ── Case workflow ─────────────────────────────────────── */
  .case-view {
    display: grid; grid-template-columns: 320px 1fr;
    min-height: calc(100vh - 64px);
  }
  .case-side {
    background: var(--panel); border-right: 1px solid var(--line);
    padding: 1.4rem 1.2rem; overflow-y: auto;
  }
  .case-main { padding: 1.5rem 2rem 4rem; overflow-y: auto; }

  .case-side h3 {
    margin: 0 0 0.45rem; font-size: 0.7rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-faint); font-weight: 700;
  }
  .case-side .demo {
    color: var(--text); font-size: 0.95rem; font-weight: 500;
    margin-bottom: 0.85rem;
  }
  .case-side .stem-box {
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 8px; padding: 0.95rem 1rem;
    line-height: 1.6; font-size: 0.92rem; color: var(--text);
    margin-bottom: 1rem;
    border-left: 3px solid var(--ecu-purple-2);
  }
  .case-side .vitals {
    background: var(--bg); border: 1px solid var(--line);
    border-radius: 8px; padding: 0.7rem 0.85rem;
    font-size: 0.83rem; color: var(--text-dim); margin-bottom: 1.1rem;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .progress-bar {
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 8px; padding: 0.65rem 0.85rem; margin-bottom: 1rem;
  }
  .progress-bar .pb-label {
    display: flex; justify-content: space-between;
    font-size: 0.72rem; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
    margin-bottom: 0.4rem;
  }
  .progress-bar .pb-label .num { color: var(--gold-text); font-weight: 700; }
  .progress-bar .bar {
    height: 5px; background: var(--line); border-radius: 999px; overflow: hidden;
  }
  .progress-bar .bar > span {
    display: block; height: 100%;
    background: linear-gradient(90deg, var(--ecu-purple-2) 0%, var(--ecu-gold) 100%);
    transition: width 0.35s ease;
  }

  /* Step indicator (horizontal) */
  .stepper {
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .stepper .step {
    flex: 1; padding: 0.6rem 0.85rem; border-radius: 6px;
    border: 1px solid var(--line); background: var(--panel);
    font-size: 0.82rem; color: var(--text-faint);
    display: flex; align-items: center; gap: 0.55rem;
    transition: all 0.18s;
  }
  .stepper .step .num {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--bg-2); border: 1px solid var(--line-2);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700;
  }
  .stepper .step.done { color: var(--text-dim); border-color: var(--line-2); }
  .stepper .step.done .num {
    background: rgba(45, 212, 191, 0.15); border-color: var(--good); color: var(--good);
  }
  .stepper .step.active {
    color: var(--gold-text); border-color: var(--gold-text);
    background: linear-gradient(180deg, rgba(255, 199, 44, 0.08) 0%, transparent 100%);
  }
  .stepper .step.active .num {
    background: var(--ecu-gold); color: var(--bg); border-color: var(--gold-text);
  }

  /* ── Scan stage ────────────────────────────────────────── */
  .stage-header { margin-bottom: 1.25rem; }
  .stage-header h2 {
    margin: 0 0 0.25rem; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.015em;
  }
  .stage-header .stage-meta { color: var(--text-dim); font-size: 0.92rem; }

  .scan-grid {
    display: grid; grid-template-columns: 320px 1fr; gap: 1.5rem;
  }
  .scan-grid .body-diagram,
  .scan-grid .windows-panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 1.1rem;
  }
  .panel-h {
    display: flex; align-items: center; justify-content: space-between;
    margin: 0 0 0.85rem;
  }
  .panel-h h4 {
    margin: 0; font-size: 0.74rem; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700;
  }
  .panel-h .help {
    color: var(--text-faint); font-size: 0.75rem;
  }

  .windows-list {
    list-style: none; padding: 0; margin: 0;
    display: flex; flex-direction: column; gap: 0.4rem;
  }
  .windows-list li button {
    width: 100%; text-align: left; background: var(--panel-2);
    border: 1px solid var(--line); border-radius: 7px;
    padding: 0.7rem 0.85rem; color: var(--text); font-size: 0.9rem;
    display: flex; align-items: center; gap: 0.7rem; transition: all 0.15s;
  }
  .windows-list li button:hover {
    border-color: var(--ecu-purple-2); background: var(--panel-3);
  }
  .windows-list li button.active {
    border-color: var(--gold-text);
    background: linear-gradient(180deg, rgba(255, 199, 44, 0.08) 0%, transparent 100%);
  }
  .windows-list li button .check {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1.5px solid var(--text-faint);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; color: transparent; flex-shrink: 0;
  }
  .windows-list li button.viewed .check {
    background: var(--good); border-color: var(--good);
    color: var(--bg); font-weight: 800;
  }
  .windows-list li button .label { flex: 1; }
  .windows-list li button .key-tag {
    font-size: 0.62rem; color: var(--gold-text);
    border: 1px solid var(--ecu-gold); padding: 1px 6px;
    border-radius: 3px; letter-spacing: 0.1em; font-weight: 700;
    background: rgba(255, 199, 44, 0.08);
  }

  /* Body diagram SVG zones */
  .body-zone {
    fill: var(--panel-2); stroke: var(--line-2); stroke-width: 1;
    cursor: pointer; transition: all 0.15s;
  }
  .body-zone:hover { fill: var(--panel-3); stroke: var(--ecu-purple-2); }
  .body-zone.active {
    fill: rgba(255, 199, 44, 0.18); stroke: var(--ecu-gold); stroke-width: 2;
  }
  .body-zone.viewed {
    fill: rgba(45, 212, 191, 0.13); stroke: var(--good);
  }

  /* ── Findings report ───────────────────────────────────── */
  .findings-report {
    margin-top: 1.5rem; background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-md);
  }
  .findings-report .fr-header {
    padding: 0.95rem 1.2rem; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, var(--panel-2) 0%, var(--panel) 100%);
  }
  .findings-report .fr-header .label { font-size: 0.95rem; font-weight: 600; }
  .findings-report .fr-header .preset {
    font-family: ui-monospace, monospace; font-size: 0.72rem; color: var(--text-faint);
    padding: 0.25rem 0.55rem; background: var(--bg); border-radius: 4px;
    border: 1px solid var(--line);
  }
  .findings-report .fr-empty {
    padding: 3.5rem 1.5rem; text-align: center; color: var(--text-faint);
    font-size: 0.92rem;
  }
  .findings-report .fr-empty .empty-icon {
    width: 48px; height: 48px; margin: 0 auto 1rem; opacity: 0.5;
  }
  .findings-report h5 {
    margin: 0; padding: 1rem 1.25rem 0.45rem;
    font-size: 0.7rem; color: var(--text-faint);
    letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700;
  }
  .findings-table {
    width: 100%; border-collapse: collapse; font-size: 0.92rem;
  }
  .findings-table tr { border-top: 1px solid var(--line); transition: background 0.12s; }
  .findings-table tr:first-child { border-top: none; }
  .findings-table tr:hover { background: rgba(107, 58, 166, 0.04); }
  .findings-table td {
    padding: 0.75rem 1.25rem; vertical-align: top; line-height: 1.55;
  }
  .findings-table td.f-icon {
    width: 24px; padding-right: 0; text-align: center; padding-top: 0.95rem;
    font-weight: 700;
  }
  .findings-table td.f-label {
    width: 36%; color: var(--text-dim); font-weight: 500; padding-right: 0.5rem;
  }
  .findings-table td.f-value { color: var(--text); }
  .findings-table tr.f-normal td.f-icon { color: var(--text-faint); }
  .findings-table tr.f-normal td.f-icon::before { content: '·'; font-size: 1.4rem; line-height: 0.7; }
  .findings-table tr.f-abnormal td.f-icon { color: var(--gold-text); }
  .findings-table tr.f-abnormal td.f-icon::before { content: '!'; }
  .findings-table tr.f-abnormal td.f-label { color: var(--gold-text); }
  .findings-table tr.f-key {
    background: linear-gradient(90deg, rgba(255, 199, 44, 0.06) 0%, transparent 100%);
  }
  .findings-table tr.f-key td.f-icon { color: var(--gold-text); }
  .findings-table tr.f-key td.f-icon::before { content: '⚑'; }
  .findings-table tr.f-key td.f-label {
    color: var(--gold-text); font-weight: 700;
  }
  .findings-table tr.f-key td.f-value {
    color: var(--text); font-weight: 600;
  }
  .findings-table .pill {
    display: inline-block; font-size: 0.62rem; padding: 1px 7px; border-radius: 3px;
    margin-left: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 700;
    background: var(--ecu-gold); color: var(--bg);
    vertical-align: 1px;
  }
  .findings-report .interpretation {
    margin: 0; padding: 1.1rem 1.3rem 1.3rem;
    background: linear-gradient(180deg, rgba(107, 58, 166, 0.1) 0%, var(--panel-2) 100%);
    border-top: 1px solid var(--line);
    line-height: 1.6; font-size: 0.93rem; color: var(--text);
  }
  .findings-report .interpretation .label {
    color: var(--ecu-purple-2); font-size: 0.7rem; letter-spacing: 0.12em;
    text-transform: uppercase; font-weight: 700; margin-bottom: 0.45rem; display: block;
  }

  /* ── Buttons ───────────────────────────────────────────── */
  .cta-row {
    margin-top: 1.5rem; display: flex; gap: 0.7rem;
    align-items: center; flex-wrap: wrap;
  }
  .btn {
    padding: 0.65rem 1.1rem; border-radius: 7px; border: 1px solid var(--line-2);
    background: var(--panel-2); color: var(--text);

function getStoredTheme() {
  try {
    const saved = localStorage.getItem('ecu-pocus-theme');

  // Fall back to system preference
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) return 'light';
  return 'dark';
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  try { localStorage.setItem('ecu-pocus-theme', theme); } catch (e) {}
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
}

/* ──────────────────────────────────────────────────────────
   STATE + ROUTER
   ────────────────────────────────────────────────────────── */
const state = {
  view: 'home',
  caseId: null,
  stage: 'stem',
  viewedWindows: {},
  activeWindow: null,
  diagnosisChoice: null,
  completed: new Set(),
};

function getCase(id) { return CASES.find(c => c.id === id); }
function viewedSet(caseId) {
  if (!state.viewedWindows[caseId]) state.viewedWindows[caseId] = new Set();
  return state.viewedWindows[caseId];
}
function keyWindowsViewed(c) {
  const keys = c.scanWindows.filter(w => w.containsKey);
  const viewed = viewedSet(c.id);
  return keys.every(w => viewed.has(w.id));
}

function go(view, opts = {}) {
  Object.assign(state, opts, { view });
  render();
  window.scrollTo(0, 0);
}
function openCase(id) {
  state.caseId = id;
  state.stage = 'stem';
  state.activeWindow = null;
  state.diagnosisChoice = null;
  go('case');
}

/* ──────────────────────────────────────────────────────────
   RENDER FUNCTIONS
   ────────────────────────────────────────────────────────── */
const app = document.getElementById('app');

function render() {
  if (state.view === 'home') return renderHome();
  if (state.view === 'case') return renderCase();
}

function renderFooter() {
  const year = new Date().getFullYear();
  return `
    <footer class="app-footer">
      <div class="footer-inner">
        <div class="f-brand">
          ${BRAND_MARK}
          <div class="text">
            <strong><span class="ecu">ECU</span> Med-Peds POCUS Program</strong>
            East Carolina University · Brody School of Medicine
          </div>
        </div>
        <div class="meta">
          For educational use only. Not for clinical decision making.<br>
          Cases adapted for combined Internal Medicine &amp; Pediatrics resident training.
        </div>
        <div class="year">AY ${year}–${(year + 1).toString().slice(-2)}</div>
      </div>
    </footer>
  `;
}

/* ─── Home ─── */
function renderHome() {
  const groups = {};
  CASES.forEach(c => { (groups[c.chief] ||= []).push(c); });

  const totalWindows = CASES.reduce((acc, c) => acc + c.scanWindows.length, 0);
  const totalFindings = CASES.reduce((acc, c) =>
    acc + c.scanWindows.reduce((a, w) => a + w.findings.length, 0), 0);
  const completedCount = state.completed.size;

  app.innerHTML = `
    <header class="topbar">
      ${BRAND_WORDMARK}
      <div class="crumbs">Bedside ultrasound case-based learning</div>
      <div class="topbar-actions">${THEME_TOGGLE}</div>
    </header>
    <div class="home">
      <div class="hero">
        <div class="program-tag">Med-Peds Residency · POCUS Curriculum</div>
        <h1>Bedside ultrasound, <span class="accent">case by case</span></h1>
        <p class="lede">
          Each case starts with a real bedside scenario. Read the stem, scan systematically,
          review the structured findings at every site, then decide on diagnosis and management
          with your instructor. Designed for Med-Peds residents at every PGY level.
        </p>
        <div class="stats">
          <div class="stat"><div class="num">${CASES.length}</div><span class="label">Cases</span></div>
          <div class="stat"><div class="num">${Object.keys(groups).length}</div><span class="label">Chief complaints</span></div>
          <div class="stat"><div class="num">${totalWindows}</div><span class="label">Scan windows</span></div>
          <div class="stat"><div class="num">${totalFindings}</div><span class="label">Findings</span></div>
          ${completedCount > 0 ? `<div class="stat"><div class="num">${completedCount}</div><span class="label">Completed</span></div>` : ''}
        </div>
      </div>

      ${Object.entries(groups).map(([chief, cases]) => `
        <div class="chief-section">
          <div class="chief-header">
            <h2>${chief}</h2>
            <span class="count">${cases.length} ${cases.length === 1 ? 'case' : 'cases'}</span>
          </div>
          <div class="case-grid">
            ${cases.map((c, i) => {
              const windows = c.scanWindows.length;
              const keys = c.scanWindows.filter(w => w.containsKey).length;
              return `
                <button class="case-card ${state.completed.has(c.id) ? 'completed' : ''}" data-id="${c.id}">
                  <div class="card-top">
                    <div class="num">Case ${i + 1}</div>
                    <div class="check-mark">✓</div>
                  </div>
                  <div class="title">${c.title}</div>
                  <div class="demo">${c.age} ${c.sex.charAt(0)} · ${c.oneliner}</div>
                  <div class="footer">
                    <span class="scan-count">${windows} sites</span>
                    <span>·</span>
                    <span>${keys} key views</span>
                    <span class="arrow">→</span>
                  </div>
                </button>
              `;
            }).join('')}
          </div>
        </div>
      `).join('')}
    </div>
    ${renderFooter()}
  `;
  app.querySelectorAll('.case-card').forEach(btn => {
    btn.addEventListener('click', () => openCase(btn.dataset.id));
  });
  const homeLink = app.querySelector('#brand-home');
  if (homeLink) homeLink.addEventListener('click', e => { e.preventDefault(); go('home'); });
  wireThemeToggle();
}

/* ─── Case ─── */
function renderCase() {
  const c = getCase(state.caseId);
  if (!c) return go('home');
  const totalKeys = c.scanWindows.filter(w => w.containsKey).length;
  const viewedKeys = c.scanWindows.filter(w => w.containsKey && viewedSet(c.id).has(w.id)).length;
  const stages = ['stem', 'scan', 'diagnose', 'reveal'];
  const stageIdx = stages.indexOf(state.stage);

  app.innerHTML = `
    <header class="topbar">
      ${BRAND_WORDMARK}
      <div class="crumbs">
        <span class="chief">${c.chief}</span>${c.title}
      </div>
      <div class="topbar-actions">
        ${THEME_TOGGLE}
        <button class="ghost" id="btn-home">← All cases</button>
      </div>
    </header>
    <div class="case-view">
      <aside class="case-side">
        <h3>Patient</h3>
        <div class="demo">${c.age}-year-old ${c.sex.toLowerCase()}</div>
        <div class="stem-box">${c.stem}</div>
        <div class="vitals">${c.vitals}</div>
        ${state.stage !== 'stem' ? `
          <div class="progress-bar">
            <div class="pb-label">
              <span>Key views found</span>
              <span class="num">${viewedKeys}/${totalKeys}</span>
            </div>
            <div class="bar"><span style="width: ${(viewedKeys / totalKeys) * 100}%"></span></div>
          </div>
        ` : ''}
        <h3>Bedside flow</h3>
        <ol style="padding-left: 1.2rem; color: var(--text-dim); font-size: 0.86rem; line-height: 1.7; margin: 0;">

          <li style="${state.stage === 'scan' ? 'color: var(--gold-text); font-weight: 600;' : ''}">Scan the patient</li>
          <li style="${state.stage === 'diagnose' ? 'color: var(--gold-text); font-weight: 600;' : ''}">Make a diagnosis</li>
          <li style="${state.stage === 'reveal' ? 'color: var(--gold-text); font-weight: 600;' : ''}">Plan management</li>
        </ol>
      </aside>
      <main class="case-main" id="case-main">
        <div class="stepper">
          ${stages.map((s, i) => `
            <div class="step ${i < stageIdx ? 'done' : ''} ${i === stageIdx ? 'active' : ''}">
              <span class="num">${i < stageIdx ? '✓' : (i + 1)}</span>
              ${['Read case', 'Scan', 'Diagnose', 'Manage'][i]}

  const homeLink = app.querySelector('#brand-home');
  if (homeLink) homeLink.addEventListener('click', e => { e.preventDefault(); go('home'); });
  wireThemeToggle();
  renderStage();
}

function renderStage() {
  const c = getCase(state.caseId);
  const main = document.getElementById('stage-content');
  if (state.stage === 'stem') return renderStemStage(c, main);
  if (state.stage === 'scan') return renderScanStage(c, main);
  if (state.stage === 'diagnose') return renderDiagnoseStage(c, main);
  if (state.stage === 'reveal') return renderRevealStage(c, main);
}

function renderStemStage(c, main) {
  main.innerHTML = `
    <div class="stage-header">

      <div class="stage-meta">${c.chief} chief complaint · resident-level case</div>
    </div>
    <div class="dx-card">
      <p style="color: var(--text); line-height: 1.7; font-size: 1rem; margin: 0 0 1.1rem;">${c.stem}</p>
      <div style="background: var(--bg-2); border: 1px solid var(--line); border-radius: 8px; padding: 0.85rem 1rem; font-family: ui-monospace, monospace; color: var(--text); font-size: 0.9rem; border-left: 3px solid var(--ecu-gold);">
        ${c.vitals}
      </div>
      <div style="margin-top: 1.25rem; color: var(--text-faint); font-size: 0.88rem; line-height: 1.55;">

      </div>
      <div class="cta-row">
        <button class="btn primary" id="btn-begin-scan">Begin scan →</button>
      </div>
    </div>

    state.stage = 'scan';

  });
}

function renderScanStage(c, main) {
  const viewed = viewedSet(c.id);
  const win = state.activeWindow ? c.scanWindows.find(w => w.id === state.activeWindow) : null;

  main.innerHTML = `
    <div class="stage-header">
      <h2>Scan the patient</h2>
      <div class="stage-meta">Click a region of the body or pick a scan window from the list. Each site shows the structured findings you'd document.</div>
    </div>
    <div class="scan-grid">
      <div class="body-diagram">
        <div class="panel-h">
          <h4>Probe placement</h4>
        </div>
        ${bodyDiagramSVG(c, viewed)}
        <div style="color: var(--text-faint); font-size: 0.78rem; margin-top: 0.85rem; line-height: 1.5;">
          Probe icon shows the active site. Green zones have been imaged.
        </div>
      </div>
      <div class="windows-panel">
        <div class="panel-h">
          <h4>Scan windows</h4>
          <span class="help">${c.scanWindows.length} available</span>
        </div>
        <ul class="windows-list">
          ${c.scanWindows.map(w => `
            <li>
              <button class="${viewed.has(w.id) ? 'viewed' : ''} ${state.activeWindow === w.id ? 'active' : ''}" data-win="${w.id}">
                <span class="check">${viewed.has(w.id) ? '✓' : ''}</span>
                <span class="label">${w.label}</span>
                ${w.containsKey ? '<span class="key-tag">KEY</span>' : ''}
              </button>
            </li>
          `).join('')}
        </ul>
      </div>
    </div>
    ${renderFindingsReport(win)}
    <div class="cta-row">
      <button class="btn subtle" id="btn-back-stem">← Back to case</button>
      <button class="btn primary" id="btn-diagnose" ${!keyWindowsViewed(c) ? 'disabled' : ''}>
        ${keyWindowsViewed(c) ? 'I have my findings — diagnose →' : `Find all ${c.scanWindows.filter(w => w.containsKey).length} key views first`}
      </button>
    </div>
  `;

  main.querySelectorAll('.windows-list button').forEach(b => {
    b.addEventListener('click', () => {
      const id = b.dataset.win;
      state.activeWindow = id;
      viewedSet(c.id).add(id);
      render();
    });
  });
  main.querySelectorAll('.body-zone').forEach(z => {
    z.addEventListener('click', () => {
      const region = z.dataset.region;
      const candidate = c.scanWindows.find(w => w.region === region && !viewedSet(c.id).has(w.id))
        || c.scanWindows.find(w => w.region === region);
      if (candidate) {
        state.activeWindow = candidate.id;
        viewedSet(c.id).add(candidate.id);
        render();
      }
    });
  });
  document.getElementById('btn-back-stem').addEventListener('click', () => {
    state.stage = 'stem';
    render();
  });
  const dx = document.getElementById('btn-diagnose');
  if (dx) dx.addEventListener('click', () => {
    if (!keyWindowsViewed(c)) return;
    state.stage = 'diagnose';
    render();
  });
}

        C 122 130, 121 158, 119 180
        C 117 200, 116 220, 120 240
        C 124 260, 124 280, 122 300
        C 120 320, 117 340, 113 358
        C 112 364, 114 370, 120 370
        C 126 370, 130 366, 131 360
        C 134 340, 136 320, 138 300
        C 139 290, 140 280, 140 270
        C 140 280, 141 290, 142 300
        C 144 320, 146 340, 149 360
        C 150 366, 154 370, 160 370
        C 166 370, 168 364, 167 358
        C 163 340, 160 320, 158 300
        C 156 280, 156 260, 160 240
        C 164 220, 163 200, 161 180

function probeIconForRegion(region) {
  const positions = {
    'thorax-r': [114, 115],
    'thorax-l': [166, 115],

    'subxiphoid': [140, 191],
    'flank-r': [104, 230],
    'flank-l': [176, 230],
    'pelvis': [140, 276],
  };
  const p = positions[region];
  if (!p) return '';
  return `
    <g transform="translate(${p[0]}, ${p[1]})">
      <rect x="-9" y="-14" width="18" height="14" rx="3" fill="var(--ecu-gold)" stroke="var(--ecu-gold)" stroke-width="1"/>

}

        ${c.diagnosis.options.map((opt, i) => `
          <button class="dx-option" data-opt="${opt.replace(/"/g, '&quot;')}">
            <span class="key">${String.fromCharCode(65 + i)}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="cta-row">
        <button class="btn subtle" id="btn-back-scan">← Back to scan</button>
      </div>
    </div>
  `;
  document.getElementById('btn-back-scan').addEventListener('click', () => {
    state.stage = 'scan';
    render();
  });
  main.querySelectorAll('.dx-option').forEach(btn => {
    btn.addEventListener('click', () => {
      state.diagnosisChoice = btn.dataset.opt;
      main.querySelectorAll('.dx-option').forEach(b => b.disabled = true);
      const isCorrect = state.diagnosisChoice === c.diagnosis.correct;
      btn.classList.add(isCorrect ? 'correct' : 'incorrect');
      if (!isCorrect) {
        main.querySelectorAll('.dx-option').forEach(b => {
          if (b.dataset.opt === c.diagnosis.correct) b.classList.add('correct');
        });
      }
      setTimeout(() => {
        state.stage = 'reveal';
        state.completed.add(c.id);
        render();
      }, 900);
    });
  });
}

function renderRevealStage(c, main) {
  const isCorrect = state.diagnosisChoice === c.diagnosis.correct;
  main.innerHTML = `
    <div class="stage-header">
      <h2>Diagnosis &amp; management</h2>
      <div class="stage-meta">Review with your instructor at the bedside.</div>
    </div>
    <div class="reveal">
      <div class="dx-banner ${isCorrect ? '' : 'miss'}">
        <div class="label">${isCorrect ? '✓ Correct diagnosis' : 'Reconsider'}</div>
        <div class="answer">${c.diagnosis.correct}</div>
        <div class="rationale">${c.diagnosis.rationale}</div>
      </div>
      <section>
        <h4>Interpretation &amp; management</h4>
        <div class="subhead">Findings synthesis by site</div>
        <ul class="interp-list">
          ${c.scanWindows.map(w => `
            <li>
              <span class="site">${w.label}</span>
              <span class="site-text">${w.interpretation}</span>
            </li>
          `).join('')}
        </ul>
        <div class="subhead">Management plan</div>
        <ul>${c.management.map(m => `<li>${m}</li>`).join('')}</ul>
      </section>
      <section>
        <h4>POCUS pearls</h4>
        <ul>${c.pearls.map(p => `<li>${p}</li>`).join('')}</ul>
      </section>
      <div class="bedside-prompt">
        <strong>Bedside discussion with instructor</strong>
        <p>${c.bedsidePrompt}</p>
      </div>
      <div class="cta-row">
        <button class="btn" id="btn-redo-scan">↻ Re-scan this patient</button>
        <button class="btn subtle" id="btn-back-home">All cases</button>
        ${nextCaseButton(c)}
      </div>
    </div>
  `;
  document.getElementById('btn-redo-scan').addEventListener('click', () => {
    state.stage = 'scan';
    render();
  });
  document.getElementById('btn-back-home').addEventListener('click', () => go('home'));
  const nb = document.getElementById('btn-next-case');
  if (nb) nb.addEventListener('click', () => openCase(nb.dataset.next));
}

function nextCaseButton(c) {
  const idx = CASES.findIndex(x => x.id === c.id);
  const next = CASES[idx + 1];
  if (!next) return '';
  return `<button class="btn gold" id="btn-next-case" data-next="${next.id}">Next case → ${next.title}</button>`;
}

/* ---- boot ---- */
render();
</script>
</body>
</html>
